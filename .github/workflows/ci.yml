name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  contract:
    name: TEE contract (build + unit tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add wasm target
        run: rustup target add wasm32-wasip2
      - name: Unit tests
        working-directory: gate-contract
        run: cargo test
      - name: Build wasm component
        working-directory: gate-contract
        run: cargo build --release --target wasm32-wasip2
      - name: Check artifact
        run: test -f gate-contract/target/wasm32-wasip2/release/gate_contract.wasm

  crypto:
    name: VC gate crypto tests (offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install
        working-directory: agent
        run: npm ci
      - name: Test (issue/verify, tamper, selective disclosure, edge cases)
        working-directory: agent
        run: npm test
